<footer class="surface-ground mt-auto">
  <div class="layout-container py-4 flex flex-column align-items-center gap-2">
    <nav class="flex align-items-center gap-4 flex-wrap" aria-label="Legal">
      <a [routerLink]="impressumLink()" class="no-underline" i18n="@@footer.impressum">Impressum</a>
      <a [routerLink]="datenschutzLink()" class="no-underline" i18n="@@footer.datenschutz"
        >Datenschutz</a
      >
      <button
        type="button"
        (click)="consent.revoke()"
        class="no-underline cursor-pointer p-0 border-none bg-transparent text-color-secondary"
        i18n="@@footer.cookiePreferences"
      >
        Cookie-Einstellungen
      </button>
    </nav>
    <p class="text-color-secondary text-sm m-0">&copy; {{ currentYear }} Lars Kleen</p>
  </div>
</footer>
