<div class="flex align-items-center gap-1">
  <p-select-button
    [options]="localeOptions"
    [ngModel]="currentLocale()"
    (ngModelChange)="switchLocale($event)"
    optionLabel="label"
    optionValue="value"
    size="small"
    [allowEmpty]="false"
    aria-label="Language switcher"
  />
</div>
