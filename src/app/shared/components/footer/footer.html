<footer class="surface-ground mt-auto">
  <div class="layout-container py-4 flex flex-column align-items-center gap-2">
    <nav class="flex align-items-center gap-4 flex-wrap" aria-label="Legal">
      <p-button
        [label]="labelImprint()"
        [text]="true"
        size="small"
        (onClick)="router.navigate(imprintLink())"
      />
      <p-button
        [label]="labelPrivacyPolicy()"
        [text]="true"
        size="small"
        (onClick)="router.navigate(privacyPolicyLink())"
      />
      <p-button
        [label]="labelCookiePreferences()"
        [text]="true"
        size="small"
        (onClick)="consent.revoke()"
      />
    </nav>
    <p class="text-color-secondary text-sm m-0">&copy; {{ currentYear }} Lars Kleen</p>
  </div>
</footer>
