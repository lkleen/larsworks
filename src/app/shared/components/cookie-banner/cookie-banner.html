@if (consent.isPending) {
  <dialog
    class="fixed bottom-0 left-0 right-0 surface-overlay shadow-4 p-4 z-5 border-none"
    open
    aria-label="Cookie consent"
  >
    <div
      class="flex flex-column md:flex-row align-items-center justify-content-between gap-3 layout-container"
    >
      <p class="m-0 text-color-secondary">
        {{ cookieMessage() }}
        <a [routerLink]="privacyPolicyLink()">{{ cookiePrivacyPolicy() }}</a>
      </p>
      <div class="flex gap-2 flex-shrink-0">
        <p-button
          [label]="cookieDecline()"
          [outlined]="true"
          severity="secondary"
          (onClick)="decline()"
        />
        <p-button [label]="cookieAccept()" (onClick)="accept()" />
      </div>
    </div>
  </dialog>
}
