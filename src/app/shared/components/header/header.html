<header class="surface-ground">
  <p-menubar [model]="menuItems()" [dt]="{ background: '{surface.ground}' }">
    <ng-template #start>
      <a [routerLink]="homeLink()" class="font-bold no-underline mr-3" aria-label="Lars Kleen home">
        Lars Kleen
      </a>
    </ng-template>

    <ng-template #end>
      <div class="flex align-items-center gap-2">
        <app-locale-switcher />
        <p-button
          [icon]="darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
          [rounded]="true"
          [text]="true"
          (onClick)="toggleTheme()"
          [attr.aria-label]="darkMode() ? toggleLightLabel() : toggleDarkLabel()"
        />
      </div>
    </ng-template>
  </p-menubar>
</header>
